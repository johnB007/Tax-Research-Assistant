<svg viewBox="0 0 1100 1200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .outer-frame { fill: #0b1220; stroke: #1f2937; stroke-width: 2; }
      .title-panel { fill: #0b2a4a; stroke: #3b82f6; stroke-width: 2; }
      .section-panel { fill: #051426; stroke: #3b82f6; stroke-width: 1.5; }
      .file-item { fill: #0d1626; stroke: #1e3a5f; stroke-width: 1; }
      .accent-bar { fill: #3b82f6; }
      .title-text { font-family: ui-sans-serif, system-ui; font-size: 20px; font-weight: 600; fill: #f1f5f9; }
      .section-title { font-family: ui-sans-serif, system-ui; font-size: 16px; font-weight: 600; fill: #dbeafe; }
      .file-text { font-family: ui-monospace, Consolas, monospace; font-size: 13px; fill: #93c5fd; }
      .file-desc { font-family: ui-sans-serif, system-ui; font-size: 11px; fill: #94a3b8; }
      .separator { stroke: #1e3a5f; stroke-width: 1; }
    </style>
  </defs>

  <!-- Outer frame -->
  <rect class="outer-frame" width="1100" height="1200" rx="12"/>

  <!-- Title section -->
  <rect class="title-panel" x="20" y="20" width="1060" height="70" rx="8"/>
  <rect class="accent-bar" x="20" y="20" width="6" height="70" rx="3"/>
  <text class="title-text" x="40" y="55">Tax Research Assistant — Project Structure</text>

  <!-- Root level -->
  <g>
    <rect class="section-panel" x="20" y="110" width="1060" height="200" rx="6"/>
    <rect class="accent-bar" x="20" y="110" width="3" height="200" rx="2"/>
    <text class="section-title" x="35" y="135">Root Directory</text>
    
    <!-- Main files grid -->
    <g id="root-files">
      <rect class="file-item" x="30" y="150" width="220" height="145" rx="4"/>
      <text class="file-text" x="42" y="172">app.py</text>
      <text class="file-desc" x="42" y="190">Streamlit web interface</text>
      <text class="file-desc" x="42" y="207">• Filing profile sidebar</text>
      <text class="file-desc" x="42" y="224">• Statement upload</text>
      <text class="file-desc" x="42" y="241">• Q&amp;A interface</text>

      <rect class="file-item" x="270" y="150" width="220" height="145" rx="4"/>
      <text class="file-text" x="282" y="172">requirements.txt</text>
      <text class="file-desc" x="282" y="190">All dependencies pinned</text>
      <text class="file-desc" x="282" y="207">• Streamlit 1.38+</text>
      <text class="file-desc" x="282" y="224">• OpenAI, Pandas</text>
      <text class="file-desc" x="282" y="241">• pypdf, Tesseract</text>

      <rect class="file-item" x="510" y="150" width="220" height="145" rx="4"/>
      <text class="file-text" x="522" y="172">config.json</text>
      <text class="file-desc" x="522" y="190">User preferences</text>
      <text class="file-desc" x="522" y="207">• Filing year, status</text>
      <text class="file-desc" x="522" y="224">• State, income profile</text>
      <text class="file-desc" x="522" y="241">• Auto-created at start</text>

      <rect class="file-item" x="750" y="150" width="300" height="145" rx="4"/>
      <text class="file-text" x="762" y="172">LICENSE, README.md</text>
      <text class="file-desc" x="762" y="190">MIT License with tax disclaimer</text>
      <text class="file-desc" x="762" y="207">Complete documentation</text>
      <text class="file-desc" x="762" y="224">Quick start, features, FAQ</text>
    </g>
  </g>

  <!-- tax_agent module -->
  <g>
    <rect class="section-panel" x="20" y="330" width="520" height="450" rx="6"/>
    <rect class="accent-bar" x="20" y="330" width="3" height="450" rx="2"/>
    <text class="section-title" x="35" y="355">tax_agent/</text>
    <text class="file-desc" x="35" y="375">Core agent modules and logic</text>

    <rect class="file-item" x="30" y="390" width="230" height="110" rx="4"/>
    <text class="file-text" x="42" y="412">agent.py</text>
    <text class="file-desc" x="42" y="430">Question answering engine</text>
    <text class="file-desc" x="42" y="447">• OpenAI integration</text>
    <text class="file-desc" x="42" y="464">• Citation generation</text>

    <rect class="file-item" x="280" y="390" width="240" height="110" rx="4"/>
    <text class="file-text" x="292" y="412">law_ingest.py</text>
    <text class="file-desc" x="292" y="430">Web crawler &amp; indexer</text>
    <text class="file-desc" x="292" y="447">• Recursive crawl</text>
    <text class="file-desc" x="292" y="464">• Chunk &amp; FTS5 index</text>

    <rect class="file-item" x="30" y="520" width="230" height="110" rx="4"/>
    <text class="file-text" x="42" y="542">retrieval.py</text>
    <text class="file-desc" x="42" y="560">SQLite FTS5 search</text>
    <text class="file-desc" x="42" y="577">• Semantic queries</text>
    <text class="file-desc" x="42" y="594">• Source metadata</text>

    <rect class="file-item" x="280" y="520" width="240" height="110" rx="4"/>
    <text class="file-text" x="292" y="542">statement_parser.py</text>
    <text class="file-desc" x="292" y="560">PDF/CSV/image parsing</text>
    <text class="file-desc" x="292" y="577">• Tesseract OCR</text>
    <text class="file-desc" x="292" y="594">• RapidOCR fallback</text>

    <rect class="file-item" x="30" y="650" width="230" height="110" rx="4"/>
    <text class="file-text" x="42" y="672">expense_rules.py</text>
    <text class="file-desc" x="42" y="690">Deduction categorization</text>
    <text class="file-desc" x="42" y="707">• 65+ rules</text>
    <text class="file-desc" x="42" y="724">• Vendor/keyword match</text>

    <rect class="file-item" x="280" y="650" width="240" height="110" rx="4"/>
    <text class="file-text" x="292" y="672">states_config.py</text>
    <text class="file-desc" x="292" y="690">Multi-state framework</text>
    <text class="file-desc" x="292" y="707">• State data structure</text>
    <text class="file-desc" x="292" y="724">• Crawler configuration</text>
  </g>

  <!-- scripts and other modules -->
  <g>
    <rect class="section-panel" x="560" y="330" width="520" height="450" rx="6"/>
    <rect class="accent-bar" x="560" y="330" width="3" height="450" rx="2"/>
    <text class="section-title" x="575" y="355">scripts/ &amp; config/</text>
    <text class="file-desc" x="575" y="375">Utilities and automation</text>

    <rect class="file-item" x="570" y="390" width="240" height="110" rx="4"/>
    <text class="file-text" x="582" y="412">refresh_law_index.py</text>
    <text class="file-desc" x="582" y="430">Index refresh runner</text>
    <text class="file-desc" x="582" y="447">• Scheduled crawl</text>
    <text class="file-desc" x="582" y="464">• Change tracking</text>

    <rect class="file-item" x="830" y="390" width="240" height="110" rx="4"/>
    <text class="file-text" x="842" y="412">refresh-tax-law.ps1</text>
    <text class="file-desc" x="842" y="430">Task Scheduler wrapper</text>
    <text class="file-desc" x="842" y="447">• Windows automation</text>
    <text class="file-desc" x="842" y="464">• Weekly refresh</text>

    <rect class="file-item" x="570" y="520" width="500" height="110" rx="4"/>
    <text class="file-text" x="582" y="542">Other modules</text>
    <text class="file-desc" x="582" y="560">config.py (settings), law_sources.py (import layer), __init__.py</text>
    <text class="file-desc" x="582" y="577">_tax-law-architect.agent.md (VS Code agent definition)</text>

    <rect class="file-item" x="570" y="650" width="500" height="110" rx="4"/>
    <text class="file-text" x="582" y="672">.venv / .gitignore</text>
    <text class="file-desc" x="582" y="690">Python virtual environment (local only, not committed)</text>
    <text class="file-desc" x="582" y="707">Gitignore rules for .db, .db-wal, .db-shm, cache, .env</text>
  </g>

  <!-- data directory -->
  <g>
    <rect class="section-panel" x="20" y="800" width="1060" height="360" rx="6"/>
    <rect class="accent-bar" x="20" y="800" width="3" height="360" rx="2"/>
    <text class="section-title" x="35" y="825">data/</text>
    <text class="file-desc" x="35" y="845">Generated at runtime — not committed to git</text>

    <rect class="file-item" x="30" y="860" width="310" height="140" rx="4"/>
    <text class="file-text" x="42" y="882">law_index.db</text>
    <text class="file-desc" x="42" y="900">SQLite FTS5 index</text>
    <text class="file-desc" x="42" y="917">• 116,516 chunks</text>
    <text class="file-desc" x="42" y="934">• 2,742+ sources</text>
    <text class="file-desc" x="42" y="951">• ~40MB (auto-created)</text>

    <rect class="file-item" x="360" y="860" width="320" height="140" rx="4"/>
    <text class="file-text" x="372" y="882">law_cache/</text>
    <text class="file-desc" x="372" y="900">Downloaded pages &amp; reports</text>
    <text class="file-desc" x="372" y="917">• sources/ (HTML cache)</text>
    <text class="file-desc" x="372" y="934">• refresh_reports/ (JSON)</text>
    <text class="file-desc" x="372" y="951">• Change tracking logs</text>

    <rect class="file-item" x="700" y="860" width="360" height="140" rx="4"/>
    <text class="file-text" x="712" y="882">uploads/ &amp; extracts/</text>
    <text class="file-desc" x="712" y="900">User uploads &amp; parsed data</text>
    <text class="file-desc" x="712" y="917">• uploads/ (PDF/CSV)</text>
    <text class="file-desc" x="712" y="934">• extracts/ (parsed CSV)</text>
    <text class="file-desc" x="712" y="951">• Per-upload metadata</text>

    <rect class="file-item" x="30" y="1020" width="1030" height="120" rx="4"/>
    <text class="file-text" x="42" y="1042">Database &amp; Cache Structure</text>
    <text class="file-desc" x="42" y="1060">law_index.db: Searchable by keyword, source, jurisdiction | law_cache: Timestamped for refresh tracking | uploads: Temporary processing buffers</text>
    <text class="file-desc" x="42" y="1077">All auto-created on first run. Safe to delete to rebuild. .gitignore prevents accidental commits.</text>
  </g>

  <!-- Footer -->
  <text class="file-desc" x="20" y="1190">Tax Research Assistant v1.0.0 • Multi-state framework ready for 50-state expansion • MIT License</text>
</svg>
